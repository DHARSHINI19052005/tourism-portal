<div class="analytics-page">

    <!-- Header -->
    <div class="analytics-header">
        <div class="header-content">
            <div class="header-text">
                <h1 class="analytics-title">📊 Booking Analytics</h1>
                <p class="analytics-subtitle">Welcome back, <strong>{{ userName }}</strong>! Here's your travel insights
                    dashboard.</p>
            </div>
            <div class="header-badge">
                <span class="live-dot"></span>
                Live Data
            </div>
        </div>

        <!-- Summary KPIs -->
        <div class="kpi-row">
            <div class="kpi-card">
                <div class="kpi-icon">🗺️</div>
                <div class="kpi-info">
                    <div class="kpi-value">1,385</div>
                    <div class="kpi-label">Total Bookings</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon">🏆</div>
                <div class="kpi-info">
                    <div class="kpi-value">Goa</div>
                    <div class="kpi-label">Top Destination</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon">✅</div>
                <div class="kpi-info">
                    <div class="kpi-value">68%</div>
                    <div class="kpi-label">Confirmed Rate</div>
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon">📅</div>
                <div class="kpi-info">
                    <div class="kpi-value">387</div>
                    <div class="kpi-label">This Month</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Grid -->
    <div class="charts-grid">
        <div class="chart-card" *ngFor="let card of cards">
            <div class="card-header">
                <div class="card-icon-title">
                    <span class="card-icon">{{ card.icon }}</span>
                    <div>
                        <div class="card-title">{{ card.title }}</div>
                        <div class="card-subtitle">{{ card.subtitle }}</div>
                    </div>
                </div>
                <div class="card-dot" [style.background]="card.color"></div>
            </div>
            <div class="canvas-wrap">
                <canvas #chartCanvas [attr.data-chart-id]="card.id" width="360" height="170"></canvas>
            </div>
        </div>
    </div>

</div>
